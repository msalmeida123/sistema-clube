version: '3.8'

# ==============================================
# SISTEMA CLUBE - Docker Compose (desenvolvimento/deploy)
# Para Docker Swarm use: docker-compose.portainer.yml
# ==============================================

services:
  sistema-clube:
    image: ghcr.io/msalmeida123/sistema-clube:${VERSION:-latest}
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.sistema-clube.rule=Host(`${DOMAIN_WEB:-clube.mindforge.dev.br}`)"
        - "traefik.http.routers.sistema-clube.entrypoints=websecure"
        - "traefik.http.routers.sistema-clube.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.sistema-clube.loadbalancer.server.port=3000"
        - "traefik.docker.network=network_swarm_public"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - WASENDER_WEBHOOK_SECRET=${WASENDER_WEBHOOK_SECRET}
    networks:
      - network_swarm_public

  app-associado:
    image: ghcr.io/msalmeida123/clube-associado:${VERSION_MOBILE:-latest}
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.app-associado.rule=Host(`${DOMAIN_APP:-app.mindforge.dev.br}`)"
        - "traefik.http.routers.app-associado.entrypoints=websecure"
        - "traefik.http.routers.app-associado.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.app-associado.loadbalancer.server.port=3000"
        - "traefik.docker.network=network_swarm_public"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    networks:
      - network_swarm_public

networks:
  network_swarm_public:
    external: true
